[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "partenit"
version = "0.2.0"
description = "Safety and decision infrastructure for robot AI — all packages in one install"
readme = "README.md"
requires-python = ">=3.11"
license = { text = "Apache-2.0" }
keywords = [
    "robotics", "safety", "AI", "LLM", "ROS2", "Isaac Sim",
    "guard", "policy", "audit", "autonomous systems",
]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "Intended Audience :: Science/Research",
    "License :: OSI Approved :: Apache Software License",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
    "Topic :: Software Development :: Libraries :: Python Modules",
]
dependencies = [
    "partenit-core>=0.1.0",
    "partenit-policy-dsl>=0.1.0",
    "partenit-trust-engine>=0.1.0",
    "partenit-agent-guard>=0.1.0",
    "partenit-adapters>=0.1.0",
    "partenit-decision-log>=0.1.0",
    "partenit-safety-bench>=0.1.0",
]

[project.optional-dependencies]
http = ["partenit-adapters[http]"]
all = [
    "partenit-adapters[http]",
    "rich>=13.0",
    "prometheus_client>=0.20",
]

[project.urls]
Homepage = "https://github.com/GradeBuilderSL/partenit"
Documentation = "https://github.com/GradeBuilderSL/partenit/tree/main/docs"
Repository = "https://github.com/GradeBuilderSL/partenit"
Issues = "https://github.com/GradeBuilderSL/partenit/issues"

[tool.hatch.build.targets.wheel]
# Meta-package: no Python source to include
packages = []
