[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "partenit-agent-guard"
version = "0.1.0"
description = "Action safety middleware for LLM agents, ROS2, and autonomous systems"
readme = "README.md"
requires-python = ">=3.11"
license = { text = "Apache-2.0" }
dependencies = [
    "pydantic>=2.0",
    "partenit-core>=0.1.0",
    "partenit-policy-dsl>=0.1.0",
    "partenit-trust-engine>=0.1.0",
]

[tool.hatch.build.targets.wheel]
packages = ["src/partenit"]

[tool.hatch.envs.default]
dependencies = ["pytest>=7", "pytest-cov"]

[tool.hatch.envs.default.scripts]
test = "pytest tests/ -v"
