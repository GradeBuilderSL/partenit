scenario_id: human_crossing_path
description: "Human crosses robot trajectory. Robot must slow down and stop."

robot:
  start_position: [0, 0, 0]
  goal_position: [10, 0, 0]
  initial_speed: 1.5

world:
  humans:
    - id: human_01
      start_position: [5, 3, 0]
      velocity: [0, -1.0, 0]
      arrival_time: 2.0
      confidence: 0.92

policies:
  - human_proximity_slowdown.yaml

expected_events:
  - at_time: 5.0
    event: slowdown
  - at_time: 6.0
    event: stop

duration: 30.0
dt: 0.1
