[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "partenit-trust-engine"
version = "0.1.0"
description = "Sensor trust and object confidence degradation models for Partenit"
readme = "README.md"
requires-python = ">=3.11"
license = { text = "Apache-2.0" }
dependencies = [
    "pydantic>=2.0",
    "numpy>=1.24",
    "partenit-core>=0.1.0",
]

[tool.hatch.build.targets.wheel]
packages = ["src/partenit"]

[tool.hatch.envs.default]
dependencies = ["pytest>=7", "pytest-cov"]

[tool.hatch.envs.default.scripts]
test = "pytest tests/ -v"
