# Prometheus scrape config for Partenit
# Usage: prometheus --config.file=monitoring/prometheus.yml

global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: partenit_analyzer
    static_configs:
      - targets: ["localhost:8000"]
    metrics_path: /metrics

  - job_name: partenit_edge_node
    static_configs:
      - targets: ["localhost:8001"]
    metrics_path: /metrics
