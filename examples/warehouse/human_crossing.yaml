scenario_id: warehouse_human_crossing
description: >
  Warehouse robot navigating across the floor when a worker crosses its path.
  Robot must slow to 0.3 m/s when within 1.5m and stop if within 0.8m.

robot:
  start_position: [0, 0, 0]
  goal_position: [10, 0, 0]
  initial_speed: 1.5

world:
  humans:
    - id: worker_01
      start_position: [5, 4, 0]
      velocity: [0, -1.0, 0]
      arrival_time: 2.0
      confidence: 0.94

policies:
  - policies.yaml

expected_events:
  - at_time: 5.5
    event: slowdown
  - at_time: 6.5
    event: stop

duration: 30.0
dt: 0.1
