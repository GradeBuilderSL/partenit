version: "3.9"

services:
  backend:
    build:
      context: ..
      dockerfile: analyzer/backend/Dockerfile
    ports:
      - "8000:8000"
    environment:
      - PARTENIT_POLICY_PATH=/app/examples/warehouse/policies.yaml
    volumes:
      - ../examples:/app/examples:ro
    restart: unless-stopped

  frontend:
    build:
      context: frontend
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped
