name: 'Partenit Safety Check'
description: >
  Validate robot safety policies, detect conflicts, and run safety scenarios.
  Produces a signed DecisionPacket audit trail and an optional HTML report.

branding:
  icon: 'shield'
  color: 'blue'

inputs:
  policy-path:
    description: 'Path to policy YAML file or directory'
    required: false
    default: 'policies/'
  scenario:
    description: 'Path to scenario YAML for safety simulation (optional)'
    required: false
    default: ''
  python-version:
    description: 'Python version to use'
    required: false
    default: '3.11'
  fail-on-conflict:
    description: 'Exit with code 1 if conflicting policies are found'
    required: false
    default: 'true'
  report-name:
    description: 'Artifact name for the HTML safety report'
    required: false
    default: 'partenit-safety-report'

outputs:
  result:
    description: "Check result: 'passed' or 'failed'"
    value: ${{ steps.set-result.outputs.result }}

runs:
  using: 'composite'
  steps:
    - name: Set up Python ${{ inputs.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ inputs.python-version }}

    - name: Install partenit (policy validation)
      shell: bash
      run: |
        ACTION_DIR="${{ github.action_path }}"
        pip install \
          "${ACTION_DIR}/partenit/packages/core" \
          "${ACTION_DIR}/partenit/packages/policy-dsl"

    - name: Install partenit (scenario runner)
      if: inputs.scenario != ''
      shell: bash
      run: |
        ACTION_DIR="${{ github.action_path }}"
        pip install \
          "${ACTION_DIR}/partenit/packages/trust-engine" \
          "${ACTION_DIR}/partenit/packages/agent-guard" \
          "${ACTION_DIR}/partenit/packages/adapters" \
          "${ACTION_DIR}/partenit/packages/decision-log" \
          "${ACTION_DIR}/partenit/packages/safety-bench"

    - name: Validate policies
      shell: bash
      run: |
        echo "::group::Policy validation — ${{ inputs.policy-path }}"
        partenit-policy validate "${{ inputs.policy-path }}"
        echo "::endgroup::"

    - name: Check policy conflicts
      shell: bash
      run: |
        echo "::group::Conflict check — ${{ inputs.policy-path }}"
        if [ "${{ inputs.fail-on-conflict }}" = "true" ]; then
          partenit-policy check-conflicts "${{ inputs.policy-path }}"
        else
          partenit-policy check-conflicts "${{ inputs.policy-path }}" || true
        fi
        echo "::endgroup::"

    - name: Run safety scenario
      if: inputs.scenario != ''
      shell: bash
      run: |
        echo "::group::Safety scenario — ${{ inputs.scenario }}"
        partenit-scenario run "${{ inputs.scenario }}" \
          --with-guard \
          --without-guard \
          --report partenit-safety-report.html
        echo "::endgroup::"

    - name: Upload safety report
      if: inputs.scenario != ''
      uses: actions/upload-artifact@v4
      with:
        name: ${{ inputs.report-name }}
        path: partenit-safety-report.html

    - name: Set result output
      id: set-result
      shell: bash
      run: echo "result=passed" >> $GITHUB_OUTPUT
